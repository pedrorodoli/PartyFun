  <template id="template-acerca-de">
    <div class="view animate__animated animate__fadeIn">
        <h2 class="view-title mb-4">Sobre PartyFun</h2>
        <div class="text-start">
            <p><strong>PartyFun</strong> es una aplicación web interactiva diseñada para animar cualquier reunión social o fiesta. La premisa es simple: los jugadores crean listas de palabras o frases divertidas y luego se dividen en equipos para competir en un juego de adivinanzas de alta energía.</p>
            <p>El objetivo es que un miembro del equipo describa la palabra que aparece en la pantalla para que sus compañeros la adivinen, ¡todo ello mientras lucha contra el reloj! Es un juego que pone a prueba la creatividad, la rapidez mental y, sobre todo, la capacidad de divertirse en grupo.</p>
            <h5 class="mt-4">¿Cómo funciona?</h5>
            <ol>
                <li><strong>Crea o Únete a un Paquete:</strong> Un "paquete" es simplemente una lista de palabras. Puedes crear uno nuevo e invitar a tus amigos a colaborar añadiendo sus propias palabras, o unirte a uno existente con un código.</li>
                <li><strong>Configura la Partida:</strong> Reúne a tus amigos, define el número de equipos, el tiempo por ronda y el número de palabras con las que jugar.</li>
                <li><strong>¡A Jugar!:</strong> Por turnos, un jugador de cada equipo intentará que sus compañeros adivinen tantas palabras como sea posible.<br>
                    En la primera ronda deberás intentar que adivinen la palabra usando el número de palabras que quieras.<br>
                    En la segunda ronda será igual que la primera, pero solo podrás utilizar una palabra para que tu equipo adivine la palabra.<br>
                    ¡Y en la tercera y última ronda deberás hacer que la adivinen mediante mímica!</li>
                <li><strong>Gana el Mejor:</strong> El equipo con más puntos al final de todas las rondas es el ganador.</li>
            </ol>
            <p class="mt-4">Nuestra misión es ofrecer una herramienta sencilla y divertida para crear momentos memorables con amigos y familiares. ¡Gracias por jugar!</p>
        </div>
        <div class="text-center mt-4">
            <button class="btn btn-secondary" data-action="viewInicio">Volver al Inicio</button>
        </div>
    </div>
</template>

  <template id="template-configurar-partida">
    <div class="view animate__animated animate__fadeIn">
        <h2 class="view-title mb-4">¡A Configurar la Partida!</h2>
        <form id="formConfigurarPartida">
            <div class="card-like-section mb-3">
                <h4 class="section-title">Paso 1: Jugadores</h4>
                 <div class="input-group mb-2">
                    <input type="text" class="form-control" id="inputNombreJugador" placeholder="Nombre del nuevo jugador">
                    <button class="btn btn-outline-secondary" type="button" id="btnAnadirJugadorConfig">Añadir</button>
                </div>
                <div id="listaJugadoresConfig" class="list-group list-group-flush" style="max-height: 150px; overflow-y: auto; background-color: #fff;">
                    <!-- Jugadores añadidos se mostrarán aquí -->
                </div>
            </div>

            <div class="card-like-section mb-3">
                <h4 class="section-title">Paso 2: Ajustes</h4>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="numEquipos" class="form-label">Número de Equipos</label>
                        <input type="number" class="form-control" id="numEquipos" value="2" min="2" required>
                    </div>
                    <div class="col-md-6">
                        <label for="tiempoRonda" class="form-label">Tiempo/Ronda (seg)</label>
                        <input type="number" class="form-control" id="tiempoRonda" value="45" min="10" step="5" required>
                    </div>
                </div>
            </div>
            
            <div class="card-like-section mb-3">
                <h4 class="section-title">Paso 3: Palabras</h4>
                 <div class="mb-3">
                    <label for="maxPalabras" class="form-label">Máximo de Palabras Totales</label>
                    <input type="number" class="form-control" id="maxPalabras" value="50" min="10" step="5" required>
                    <div class="form-text">Se tomarán hasta este número de palabras aleatoriamente de los paquetes seleccionados.</div>
                </div>
                <label class="form-label d-block mb-2">Seleccionar Paquetes:</label>
                <div id="listaPaquetesSeleccion" class="p-2 rounded mb-2" style="max-height: 180px; overflow-y: auto; border: 1px solid var(--border-color);">
                    <!-- Checkboxes de paquetes -->
                </div>
                 <p class="info-field text-end mt-1 mb-0">Palabras disponibles de paquetes seleccionados: <strong id="totalPalabrasDisponiblesConfig" class="text-primary">0</strong></p>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-success btn-lg">¡Empezar a Jugar!</button>
                <button type="button" class="btn btn-light" data-action="viewInicio">Volver</button>
            </div>
        </form>
    </div>
  </template>

    import React from 'https://esm.sh/react@18.3.1';
    import ReactDOM from 'https://esm.sh/react-dom@18.3.1/client';
    import { Toaster, sileo } from 'https://esm.sh/sileo?deps=react@18.3.1,react-dom@18.3.1';

    const container = document.createElement('div');
    document.body.appendChild(container);
    
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(Toaster, { 
      position: 'bottom-right',
      options: {
        duration: 4000,
        roundness: 16,
        styles: {
          title: 'font-weight: 600; font-family: sans-serif;',
          description: 'opacity: 0.8;'
        }
      }
    }));

    window.sileo = sileo;
  </script>
